<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senac</title>
</head>
<body>
 <form action="">  
<table border="1" cellpadding="8" cellspacing="0" width="700" align="center">
<br>
    <tr 
                bgcolor="#cccc">
                    <th colspan="5">Inscrição para o curso</th>
         </tr>
<tr>
<td colspan="4"><center><img src="../../img/logo-senac.png" alt="logo Senac" width="50%"><br> Preencha os dados abaixo para realizar sua Inscrição</center> </td>

</tr>
<tr>
         <th colspan="5">Dados Pessoais</th>
  </tr>
  <tr>
    <td>Nome Completo:</td>
    <td><label for="nome"></label>
<input type="text" name="nome" id="nome" placeholder="Digite seu nome Completo"> </td>
  </tr>

  <tr>
    <td>Data de nascimento:</td>
    <td><label for="nascimento"></label>
 <input type="date" id="nascimento" name="nascimento"></td>
  </tr>
<tr>
    <td>CPF</td>
    <td><label for="cpf">:</label>
<input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00"></td>
</tr>

<tr>
         <th colspan="5">Dados de contato</th>
  </tr>  

  <tr>
    <td>E-mail:</td>
    <td><label for="email"></label>
<input type="text" name="email" id="email" placeholder="seuemail@exemplo.com"> </td>
  </tr>

<tr>
    <td>Telefone:</td>
    <td><label for="telefone"></label>
<input type="tel" id="telefone" name="telefone" placeholder="11 99999-9999"></td>
  </tr>
  <tr>
         <th colspan="5">Dados do curso</th>
  </tr> 

  <tr>
    <td>Curso desejado:</td>
    <td label for="curso"></label>
<select name="curso" id="curso">
<option value="">Selecione um curso</option>
<option value="html">HTML5</option>
<option value="css">CSS</option>
<option value="javascript">Javascript</option>
</select></td>
  </tr>

  <tr>
    <td>Periodo:</td>
    <td><input type="checkbox" id="html" name="interesses" value="HTML5"  >
<label for="html">HTML5</label>
<br>
<input type="checkbox" id="css" name="interesses" value="CSS"  >
<label for="css">CSS</label>
<br>
<input type="checkbox" id="javascript" name="interesses" value="Javascript"  >
<label for="javascript">Javascript</label></td>
  </tr>

 <tr>
         <th colspan="5">Dados de acesso</th>
  </tr> 
<tr>
    <td colspan="2"><fieldset>
<legend> Criação de acesso </legend>
<label for="login">Usuario</label>
<input type="text" id="login" name="login">
<br><br>
<label for="senah2">Senha</label>
<input type="password" id="senha2" name="senha2">
</fieldset></td>
</tr>

<tr>
         <th colspan="5">Observação</th>
  </tr> 

  <tr>
    <td>Observação:</td>
    <td><label for="observacao"></label>
<textarea name="observacao" id="observacao" rows="5" cols="40"></textarea></td>
  </tr>
</table>
</form> 
    <center>
        <input type="reset" value="Limpar campos">
        <input type="button" value="Botão comum">
    </center>
    <br>
<a href="../../Portifolio-Robson.html"><center>Voltar Tela inicial</center></a>
</body>
</html>

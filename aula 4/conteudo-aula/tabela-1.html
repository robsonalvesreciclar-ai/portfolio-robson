<!-- a tag table cria uma tabela 
 border = "1" cria uma borda simples.
 cellpadding="8" cria um espaço interno dentro das celulas.
 cellspacing="0" remove o espaço entre as células.
 -->



<table border="1" cellpadding="8" cellspacing="0">

<th>E-mail</th>
